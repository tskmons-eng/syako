<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>自動車保管場所届出PDF作成</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>自動車保管場所届出PDF作成</h1>
      <p>ブラウザだけで警察様式PDFへ直接入力します。作成データはサーバーへ保存されません。</p>
    </div>
    <button id="sampleBtn" type="button">サンプル入力</button>
  </header>

  <main class="layout">
    <form id="form" class="form">
      <section>
        <h2>出力書類</h2>
        <fieldset class="checks">
          <label><input type="checkbox" name="documents.application" checked> 届出書（２通）</label>
          <label><input type="checkbox" name="documents.map" checked> 所在図・配置図</label>
          <label><input type="checkbox" name="documents.self" checked> 自認書</label>
          <label><input type="checkbox" name="documents.permission" checked> 使用承諾書</label>
        </fieldset>
      </section>

      <section>
        <h2>届出</h2>
        <div class="grid four">
          <label>警察署<input name="police_station" placeholder="前橋"></label>
          <label>届出日<input name="application_date" type="date"></label>
          <label>申請区分
            <select name="request_type">
              <option value="new">新規</option>
              <option value="replace">代替</option>
              <option value="notification" selected>届出</option>
            </select>
          </label>
          <label>使用権原
            <select name="authority">
              <option value="self">自己所有</option>
              <option value="other">他人所有</option>
              <option value="shared">共有</option>
            </select>
          </label>
        </div>
      </section>

      <section>
        <h2>届出者</h2>
        <div class="grid two">
          <label>郵便番号<input name="applicant.postal" placeholder="371-0000"></label>
          <label>電話番号<input name="applicant.phone" placeholder="027-000-0000"></label>
          <label class="wide">住所<input name="applicant.address"></label>
          <label class="wide">氏名<input name="applicant.name"></label>
          <label class="wide check-line"><input id="baseSameAsAddress" type="checkbox"> 使用の本拠の位置を住所と同じにする</label>
          <label class="wide">使用の本拠の位置<input name="applicant.base_address"></label>
        </div>
      </section>

      <section>
        <h2>自動車</h2>
        <div class="grid four">
          <label>車名<input name="vehicle.maker" placeholder="トヨタ"></label>
          <label>型式<input name="vehicle.model"></label>
          <label class="half">車台番号<input name="vehicle.chassis_no"></label>
          <label>長さ cm<input name="vehicle.length_cm" inputmode="numeric"></label>
          <label>幅 cm<input name="vehicle.width_cm" inputmode="numeric"></label>
          <label>高さ cm<input name="vehicle.height_cm" inputmode="numeric"></label>
          <label>旧登録番号<input name="vehicle.previous_registration"></label>
          <label>現登録番号<input name="vehicle.current_registration"></label>
        </div>
      </section>

      <section>
        <h2>保管場所</h2>
        <div class="grid two">
          <label class="wide check-line"><input id="parkingSameAsBase" type="checkbox"> 保管場所の位置を使用の本拠の位置と同じにする</label>
          <label class="wide">保管場所の位置<input name="parking.location"></label>
          <label>駐車場名<input name="parking.name"></label>
          <label>駐車位置番号<input name="parking.space_no"></label>
          <label>使用開始日<input name="parking.use_from" type="date"></label>
          <label>使用終了日<input name="parking.use_to" type="date" readonly></label>
          <label>シャッター
            <select name="parking.shutter">
              <option value="">未選択</option>
              <option value="yes">有</option>
              <option value="no">無</option>
            </select>
          </label>
          <label class="wide">所在図メモ<textarea name="parking.map_note" rows="3"></textarea></label>
          <label class="wide">配置図メモ<textarea name="parking.layout_note" rows="3"></textarea></label>
        </div>
      </section>

      <section id="mapSection">
        <h2>地図</h2>
        <div class="grid two">
          <label class="wide check-line"><input name="parking.use_map_images" type="checkbox" checked> 所在図・配置図へ地図を貼り付ける</label>
          <label>所在図画像<input id="overviewImageInput" type="file" accept="image/*"></label>
          <label>配置図画像<input id="detailImageInput" type="file" accept="image/*"></label>
          <p class="hint wide">画像を選んだ場合は地図より画像を優先します。画像は枠に合わせて中央で切り抜きます。</p>
          <label class="wide">住所検索
            <span class="inline-control">
              <input id="mapSearchText" placeholder="保管場所の住所で検索">
              <button id="mapSearchBtn" type="button">検索</button>
            </span>
          </label>
          <label>緯度<input name="parking.map_lat" readonly></label>
          <label>経度<input name="parking.map_lng" readonly></label>
          <label>所在図ズーム<input name="parking.overview_zoom" type="number" min="1" max="19" value="15"></label>
          <label>配置図ズーム<input name="parking.detail_zoom" type="number" min="1" max="19" value="18"></label>
        </div>
        <div class="map-grid">
          <div>
            <div class="map-title">所在図</div>
            <div id="overviewMap" class="map-box"></div>
          </div>
          <div>
            <div class="map-title">配置図</div>
            <div id="detailMap" class="map-box"></div>
          </div>
        </div>
      </section>

      <section id="landBuildingSection">
        <h2>土地・建物</h2>
        <fieldset class="checks">
          <label><input type="checkbox" name="land_building" value="land" checked> 土地</label>
          <label><input type="checkbox" name="land_building" value="building"> 建物</label>
        </fieldset>
      </section>

      <section id="ownerSection">
        <h2>所有者・管理者</h2>
        <div class="grid two">
          <label class="wide check-line"><input id="ownerSameAsApplicant" type="checkbox"> 届出者と同じにする</label>
          <label>郵便番号<input name="owner.postal"></label>
          <label>電話番号<input name="owner.phone"></label>
          <label class="wide">住所<input name="owner.address"></label>
          <label class="wide">氏名・名称<input name="owner.name"></label>
        </div>
      </section>

      <section>
        <h2>連絡先</h2>
        <div class="grid two">
          <label>氏名・担当者<input name="contact.name"></label>
          <label>電話番号<input name="contact.phone"></label>
        </div>
      </section>

      <div class="actions">
        <button id="submitBtn" type="submit">PDFを作成</button>
        <button id="clearBtn" type="button" class="secondary">クリア</button>
      </div>
    </form>

    <aside class="preview">
      <h2>出力</h2>
      <p id="status">入力後、PDFを作成してください。</p>
      <a id="openPdfLink" href="#" target="_blank" rel="noopener" hidden>PDFを開く</a>
      <iframe id="pdfFrame" title="PDF preview"></iframe>
      <button id="printBtn" type="button" disabled>PDFを印刷</button>
    </aside>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://unpkg.com/@pdf-lib/fontkit@1.1.1/dist/fontkit.umd.min.js"></script>
  <script src="./app.js?v=20260430-1908"></script>
</body>
</html>
